services:
  - type: web
    name: reel
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      - key: STABILITY_API_KEY
        sync: false
      - key: RUNWAY_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: ACCESS_PASSWORD
        sync: false
